name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Batería de pruebas (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Ejecutar batería completa (Node + Edge + MCP)
        run: node run-all-tests.js
